<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <div class="min-h-screen p-4 md:p-6 lg:p-8">
    <div class="mx-auto max-w-lg space-y-6">

      <header class="space-y-1 text-center sm:text-left">
        <h1 class="text-2xl font-semibold tracking-tight">Create account</h1>
        <p class="text-sm text-gray-500">Start your 14-day free trial. No credit card required.</p>
      </header>

      <main>
        <form class="space-y-6 rounded-lg border border-gray-200 bg-white p-4 shadow-sm md:p-6">

          <div class="space-y-4">
            <div class="space-y-2">
              <label for="name" class="block text-sm font-medium">Full name</label>
              <input id="name" type="text" placeholder="Jane Doe"
                class="h-10 w-full rounded-md border border-gray-200 px-3 text-sm outline-none focus:border-gray-400">
            </div>
            <div class="space-y-2">
              <label for="email" class="block text-sm font-medium">Email</label>
              <input id="email" type="email" placeholder="jane@company.com"
                class="h-10 w-full rounded-md border border-gray-200 px-3 text-sm outline-none focus:border-gray-400">
            </div>
            <div class="space-y-2">
              <label for="password" class="block text-sm font-medium">Password</label>
              <input id="password" type="password" placeholder="At least 8 characters"
                class="h-10 w-full rounded-md border border-gray-200 px-3 text-sm outline-none focus:border-gray-400">
            </div>
          </div>

          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <p class="text-xs text-gray-500">By signing up you agree to our Terms.</p>
            <button type="submit" class="inline-flex h-10 w-full shrink-0 items-center justify-center rounded-md bg-gray-900 px-6 text-sm font-medium text-white sm:w-auto">
              Create account
            </button>
          </div>

        </form>
      </main>

    </div>
  </div>
</body>
</html>
