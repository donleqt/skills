<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <div class="min-h-screen p-4 md:p-6 lg:p-8">
    <div class="mx-auto max-w-7xl space-y-6">

      <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div class="space-y-1">
          <h1 class="text-2xl font-semibold tracking-tight">Projects</h1>
          <p class="text-sm text-gray-500">Manage and track all active projects</p>
        </div>
        <button type="button" class="inline-flex h-10 shrink-0 items-center justify-center rounded-md bg-gray-900 px-4 text-sm font-medium text-white">
          New project
        </button>
      </header>

      <main class="space-y-6">

        <!-- Filters -->
        <section class="flex flex-col gap-4 sm:flex-row sm:items-center">
          <input type="search" placeholder="Search projects…"
            class="h-10 w-full rounded-md border border-gray-200 bg-white px-3 text-sm outline-none focus:border-gray-400 sm:max-w-xs">
          <div class="flex gap-2">
            <button type="button" class="inline-flex h-10 items-center rounded-md border border-gray-200 bg-white px-3 text-sm">All</button>
            <button type="button" class="inline-flex h-10 items-center rounded-md border border-gray-200 bg-white px-3 text-sm text-gray-500">Active</button>
            <button type="button" class="inline-flex h-10 items-center rounded-md border border-gray-200 bg-white px-3 text-sm text-gray-500">Archived</button>
          </div>
        </section>

        <!-- List with data -->
        <section class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
          <ul class="divide-y divide-gray-100">
            <li class="flex flex-col gap-3 p-4 md:flex-row md:items-center md:justify-between md:p-6">
              <div class="min-w-0 space-y-1">
                <p class="truncate font-medium">Marketing site redesign</p>
                <p class="text-sm text-gray-500">Updated 2 hours ago · 4 members</p>
              </div>
              <span class="shrink-0 self-start rounded-full bg-green-50 px-2 py-1 text-xs text-green-700 md:self-center">Active</span>
            </li>
            <li class="flex flex-col gap-3 p-4 md:flex-row md:items-center md:justify-between md:p-6">
              <div class="min-w-0 space-y-1">
                <p class="truncate font-medium">Mobile app v2</p>
                <p class="text-sm text-gray-500">Updated yesterday · 2 members</p>
              </div>
              <span class="shrink-0 self-start rounded-full bg-green-50 px-2 py-1 text-xs text-green-700 md:self-center">Active</span>
            </li>
            <li class="flex flex-col gap-3 p-4 md:flex-row md:items-center md:justify-between md:p-6">
              <div class="min-w-0 space-y-1">
                <p class="truncate font-medium">Q1 analytics report</p>
                <p class="text-sm text-gray-500">Updated 3 days ago · 1 member</p>
              </div>
              <span class="shrink-0 self-start rounded-full bg-gray-100 px-2 py-1 text-xs text-gray-600 md:self-center">Draft</span>
            </li>
          </ul>
        </section>

        <!-- Empty state (swap with list above when no data) -->
        <!--
        <section class="rounded-lg border border-dashed border-gray-200 bg-white p-8 text-center md:p-12">
          <p class="text-lg font-medium">No projects yet</p>
          <p class="mt-2 text-sm text-gray-500">Create your first project to get started.</p>
          <button type="button" class="mt-6 inline-flex h-10 items-center justify-center rounded-md bg-gray-900 px-4 text-sm font-medium text-white">
            New project
          </button>
        </section>
        -->

      </main>
    </div>
  </div>
</body>
</html>
