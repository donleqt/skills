<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <!--
    Base shell — copy this structure for every mock.
    Tokens: page p-4 md:p-6 lg:p-8 | section space-y-6 | card p-4 md:p-6 | stack gap-4
    Replace {{TITLE}} and slot content below.
  -->
  <div class="min-h-screen p-4 md:p-6 lg:p-8">
    <div class="mx-auto max-w-7xl space-y-6">

      <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <!-- Page title + optional actions -->
        <div class="space-y-1">
          <h1 class="text-2xl font-semibold tracking-tight">{{PAGE_TITLE}}</h1>
          <p class="text-sm text-gray-500">{{PAGE_DESCRIPTION}}</p>
        </div>
        <div class="flex shrink-0 gap-2">
          <!-- Primary CTA slot -->
        </div>
      </header>

      <main class="space-y-6">
        <!-- Main content sections go here -->
      </main>

    </div>
  </div>
</body>
</html>
