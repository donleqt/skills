<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <div class="min-h-screen p-4 md:p-6 lg:p-8">
    <div class="mx-auto max-w-7xl space-y-6">

      <header class="space-y-1">
        <h1 class="text-2xl font-semibold tracking-tight">Settings</h1>
        <p class="text-sm text-gray-500">Manage your account and preferences</p>
      </header>

      <main class="grid grid-cols-1 gap-6 lg:grid-cols-4">

        <!-- Sidebar nav -->
        <nav class="space-y-1 lg:col-span-1">
          <a href="#" class="block rounded-md bg-gray-100 px-3 py-2 text-sm font-medium">Profile</a>
          <a href="#" class="block rounded-md px-3 py-2 text-sm text-gray-600 hover:bg-gray-50">Notifications</a>
          <a href="#" class="block rounded-md px-3 py-2 text-sm text-gray-600 hover:bg-gray-50">Billing</a>
          <a href="#" class="block rounded-md px-3 py-2 text-sm text-gray-600 hover:bg-gray-50">Security</a>
        </nav>

        <!-- Settings panels -->
        <section class="space-y-6 lg:col-span-3">

          <div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm md:p-6">
            <h2 class="text-lg font-medium">Profile</h2>
            <p class="mt-1 text-sm text-gray-500">Update your personal information</p>

            <form class="mt-6 space-y-4">
              <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                <div class="space-y-2">
                  <label for="first-name" class="block text-sm font-medium">First name</label>
                  <input id="first-name" type="text" value="Jane"
                    class="h-10 w-full rounded-md border border-gray-200 px-3 text-sm outline-none focus:border-gray-400">
                </div>
                <div class="space-y-2">
                  <label for="last-name" class="block text-sm font-medium">Last name</label>
                  <input id="last-name" type="text" value="Doe"
                    class="h-10 w-full rounded-md border border-gray-200 px-3 text-sm outline-none focus:border-gray-400">
                </div>
              </div>
              <div class="space-y-2">
                <label for="settings-email" class="block text-sm font-medium">Email</label>
                <input id="settings-email" type="email" value="jane@company.com"
                  class="h-10 w-full rounded-md border border-gray-200 px-3 text-sm outline-none focus:border-gray-400">
              </div>
              <div class="flex justify-end pt-2">
                <button type="submit" class="inline-flex h-10 items-center justify-center rounded-md bg-gray-900 px-4 text-sm font-medium text-white">
                  Save changes
                </button>
              </div>
            </form>
          </div>

          <div class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm md:p-6">
            <h2 class="text-lg font-medium">Notifications</h2>
            <p class="mt-1 text-sm text-gray-500">Choose what you want to be notified about</p>

            <ul class="mt-6 divide-y divide-gray-100">
              <li class="flex items-center justify-between gap-4 py-4">
                <div class="min-w-0">
                  <p class="text-sm font-medium">Email digests</p>
                  <p class="text-sm text-gray-500">Weekly summary of activity</p>
                </div>
                <div class="h-6 w-11 shrink-0 rounded-full bg-gray-900"></div>
              </li>
              <li class="flex items-center justify-between gap-4 py-4">
                <div class="min-w-0">
                  <p class="text-sm font-medium">Product updates</p>
                  <p class="text-sm text-gray-500">News about new features</p>
                </div>
                <div class="h-6 w-11 shrink-0 rounded-full bg-gray-200"></div>
              </li>
            </ul>
          </div>

        </section>
      </main>
    </div>
  </div>
</body>
</html>
